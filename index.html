<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanji Study</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100dvh;
    }

    /* 전체 화면 (아이폰 비율 느낌) */
    .app {
      width: 390px;
      height: calc(100dvh - 20px);

      background: #1a1a1a;
      border-radius: 20px;
      padding: 20px;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* display 영역 */
    #display {
      height: 60%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
      gap: 1em;
    }

    /* 단어 영역 */
    .word-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3em;
    }

    /* 🔥 여기부터 핵심 (크기 분리) */
    .word-kanji {
      font-size: 2.5em;
      font-weight: bold;
    }

    .word-reading {
      font-size: 1.1em;
      opacity: 0.8;
    }

    .word-meaning {
      font-size: 1.4em;
    }

    /* 버튼 */
    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2e7d32;
      color: white;
      font-size: 1em;
    }
  </style>
</head>
<body>

  <div class="app">
    <div id="display"></div>

    <div class="controls">
      <button onclick="prev()">이전</button>
      <button onclick="next()">다음</button>
    </div>
  </div>

  <script src="kanjiData.js"></script>
  <script src="main.js"></script>
</body>
</html>
