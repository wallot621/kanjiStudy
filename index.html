<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한자 학습</title>
<!-- 1135 -->
<style>
body {
    background: #0f0f13;
    color: white;
    font-family: Arial;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    min-height: 100dvh;     /* ⭐ 수정 */
    margin: 0;
    padding-top: 10px;

    overflow-y: auto;       /* ⭐ 핵심 (잘림 해결) */
    overscroll-behavior-x: none;
}

/* ========================= */

.phone-frame {
    width: 100%;
    max-width: 420px;

    aspect-ratio: 9 / 19.5;   /* 아이폰 비율 */
}

/* ========================= */

.container {
    width: 100%;
    height: 100%;
    background: #1c1f26;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-sizing: border-box;
}

/* ========================= */

select, button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #2a2e38;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.7em;
}

/* =========================
   display 구조
========================= */

.display {
    height: 320px;
    overflow: hidden;

    display: flex;
    justify-content: center;
}

.display-inner {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;   /* ⭐ 위아래 동일 */
    align-items: center;
}

/* ========================= */

.display.kanji {
    font-size: 1em;
}

.display.reading {
    font-size: 2.5em;
}

/* ========================= */

.button-group {
    display: flex;
    gap: 10px;
}

.button-group button.active {
    background: #4caf50;
}

/* =========================
   단어
========================= */

.word-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 2em;
    row-gap: 0.2em;
    text-align: center;
    align-content: center;
    height: 100%;
}

.word-kanji {
    font-size: 1.4em;
    font-weight: bold;
}

.word-reading {
    font-size: 0.7em;
    color: #aaa;
}

.word-meaning {
    text-align: center;
}

/* =========================
   슬라이더
========================= */

#sliderWrap {
    position: relative;
    width: 85%;
    margin: 10px auto 0;
    height: 30px;

    touch-action: pan-y;
}

#sliderTrack {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 6px;
    background: #444;
    transform: translateY(-50%);
    border-radius: 3px;
}

#sliderThumb {
    position: absolute;
    top: 50%;
    width: 20px;
    height: 20px;
    background: #4caf50;
    border-radius: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="phone-frame">
    <div class="container">

        <h2>초등 상용한자 V0.3</h2>

        <select id="grade">
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4">4학년</option>
            <option value="5">5학년</option>
            <option value="6">6학년</option>
        </select>

        <button onclick="toggleMode()">모드 전환</button>

        <div class="button-group">
            <button id="btnReading" onclick="showReading()">음훈</button>
            <button id="btnWords" onclick="showWords()">단어</button>
        </div>

        <div style="text-align:right; margin-top:10px;">
            <label>
                <input type="checkbox" id="showMeaningChk"> 한자/뜻 같이보기
            </label>
        </div>

        <!-- display -->
        <div class="display kanji" id="display"></div>

        <!-- 카운터 + 버튼 -->
        <div style="
            position:relative;
            margin-top:10px;
            height:50px;
            display:flex;
            align-items:center;
        ">
            <div id="counter" style="
                position:absolute;
                left:50%;
                transform:translateX(-50%);
                font-size:14px;
                color:#aaa;
            "></div>

            <button id="btnMeaning" onclick="showMeaning()" style="
                margin-left:auto;
                width:50px;
                height:50px;
            ">뜻</button>
        </div>

        <!-- 슬라이더 -->
        <div id="sliderWrap">
            <div id="sliderTrack"></div>
            <div id="sliderThumb"></div>
        </div>

        <!-- 이동 -->
        <div class="button-group">
            <button onclick="prevKanji()">이전</button>
            <button onclick="nextKanji()">다음</button>
        </div>

    </div>
</div>

<script src="./grade1.js"></script>
<script src="./grade2.js"></script>
<script src="./grade3.js"></script>
<script src="./grade4.js"></script>
<script src="./grade5.js"></script>
<script src="./grade6.js"></script>

<script src="./kanjiData.js"></script>
<script src="./main.js"></script>

</body>
</html>
