<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한자 학습</title>

<style>
body {
    background: #0f0f13;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 90%;
    max-width: 420px;
    background: #1c1f26;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

select, button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #2a2e38;
    color: white;
    border: none;
    border-radius: 8px;
}

/* ⭐ 핵심: 높이 통일 */
.display {
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    white-space: pre-line;
}

.display.kanji {
    font-size: 18vw;
}

.display.reading {
    font-size: 9vw;
}

.progress-bar {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
    margin: 10px 0;
}

.progress {
    height: 100%;
    width: 0%;
    background: #4caf50;
}

.button-group {
    display: flex;
    gap: 10px;
}

.button-group button.active {
    background: #4caf50;
}
</style>
</head>

<body>

<div class="container">
    <h2>초등 상용한자</h2>

    <select id="grade">
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
        <option value="4">4학년</option>
        <option value="5">5학년</option>
        <option value="6">6학년</option>
    </select>

    <button onclick="toggleMode()">모드 전환</button>

    <div class="button-group">
        <button id="btnMeaning" onclick="showMeaning()">뜻</button>
        <button id="btnReading" onclick="showReading()">음훈</button>
        <button id="btnWords" onclick="showWords()">단어</button>
    </div>

    <!-- ⭐ 체크박스 추가 -->
    <div style="text-align:right; margin-top:10px;">
        <label>
            <input type="checkbox" id="showMeaningChk"> 한자/뜻 같이보기
        </label>
    </div>

    <div class="display kanji" id="display"></div>

    <div id="counter"></div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="button-group">
        <button onclick="prevKanji()">이전</button>
        <button onclick="nextKanji()">다음</button>
    </div>
</div>

<script src="grade1.js"></script>
<script src="grade2.js"></script>
<script src="grade3.js"></script>
<script src="grade4.js"></script>
<script src="grade5.js"></script>
<script src="grade6.js"></script>

<script src="kanjiData.js"></script>
<script src="main.js"></script>

</body>
</html>
