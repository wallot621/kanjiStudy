<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한자 학습</title>

<style>
body {
    background: #0f0f13;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 90%;
    max-width: 420px;
    background: #1c1f26;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

html, body {
    touch-action: manipulation;
}

select, button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #2a2e38;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.display {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 25vw;
}

.display.kanji {
    font-size: 18vw;
}

.display.reading {
    font-size: 9vw;
    line-height: 1.3;
}

#counter {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 10px;
}

.progress-bar {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress {
    height: 100%;
    width: 0%;
    background: #4caf50;
}

.button-group {
    display: flex;
    gap: 10px;
}

.button-group button {
    flex: 1;
}
</style>
</head>

<body>

<div class="container">
    <h2>한자 학습</h2>

    <select id="grade">
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
        <option value="4">4학년</option>
        <option value="5">5학년</option>
        <option value="6">6학년</option>
    </select>

    <div class="button-group">
        <button onclick="toggleMode()">모드 전환</button>
        <button id="tempBtn" onclick="showTemp()">뜻 보기</button>
    </div>

    <div class="display" id="display">一</div>

    <div id="counter">1 / 80</div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="button-group">
        <button onclick="prevKanji()">이전</button>
        <button onclick="nextKanji()">다음</button>
    </div>
</div>

<script src="kanji.js"></script>

</body>
</html>
